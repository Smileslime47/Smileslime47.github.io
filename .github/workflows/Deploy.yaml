name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # pull the code
      - name: Checkout
        uses: actions/checkout@v3

      # install node
      - name: Install and Build
        uses: actions/setup-node@v3
        run: 
          npm install
          npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          cname: 47saikyo.moe